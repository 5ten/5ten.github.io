<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>510 Interactive — Senior Digital Problem-Solvers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
        rel="stylesheet"> -->
    <script src="//use.typekit.net/sda2jfw.js"></script>
    <style>
        /* ── RESET & BASE ─────────────────────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'proxima-nova', system-ui, -apple-system, sans-serif;
            background: #ffffff;
            color: #1a2332;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }

        img {
            max-width: 100%;
            display: block;
        }

        ul {
            list-style: none;
        }

        /* ── CSS VARIABLES ────────────────────────────────────────────────────────── */
        :root {
            --navy: #0f2137;
            --navy-light: #1a3050;
            --blue: #1e5fad;
            --blue-light: #2d74cc;
            --text: #1a2332;
            --muted: #64748b;
            --border: #e1e8f0;
            --bg-light: #f6f9fc;
            --bg-dark: #0a1929;
            --white: #ffffff;
            --max-w: 1200px;
            --px: clamp(1.25rem, 4vw, 3rem);
            --section-py: clamp(4rem, 8vw, 7rem);
        }

        /* ── LAYOUT UTILITIES ─────────────────────────────────────────────────────── */
        .container {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 var(--px);
        }

        .section-pad {
            padding-block: var(--section-py);
        }

        /* ── PAGE TRANSITIONS ─────────────────────────────────────────────────────── */
        #app {
            min-height: calc(100vh - 68px);
        }

        .page {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── NAVIGATION ───────────────────────────────────────────────────────────── */
        .site-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            transition: box-shadow 0.2s;
        }

        .site-nav.scrolled {
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.06);
        }

        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 68px;
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 var(--px);
        }

        .nav-logo {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--navy);
            cursor: pointer;
        }

        .nav-logo img {
            height: 2rem;
            width: auto;
        }


        .nav-logo span {
            color: var(--blue);
            display: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2.5rem;
        }

        .nav-links a {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--muted);
            transition: color 0.15s;
            cursor: pointer;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--navy);
        }

        .nav-links .nav-contact {
            padding: 0.5rem 1.25rem;
            background: var(--navy);
            color: var(--white);
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: background 0.15s;
        }

        .nav-links .nav-contact:hover,
        .nav-links .nav-contact.active {
            background: var(--navy-light);
            color: var(--white);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            padding: 4px;
        }

        .hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--navy);
            transition: 0.2s;
            border-radius: 2px;
        }

        .mobile-menu {
            display: none;
            position: fixed;
            inset: 68px 0 0 0;
            background: var(--white);
            z-index: 99;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.5rem;
        }

        .mobile-menu.open {
            display: flex;
        }

        .mobile-menu a {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--navy);
            cursor: pointer;
        }

        /* ── HERO ─────────────────────────────────────────────────────────────────── */
        .hero {
            padding-top: clamp(4rem, 10vw, 8rem);
            padding-bottom: clamp(4rem, 10vw, 8rem);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: -10%;
            width: 50%;
            height: 100%;
            background: radial-gradient(ellipse at 70% 50%, rgba(30, 95, 173, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: 1.75rem;
        }

        .hero-eyebrow::before {
            content: '';
            width: 2rem;
            height: 2px;
            background: var(--blue);
        }

        .hero h1 {
            font-size: clamp(2.75rem, 6vw, 5rem);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.03em;
            color: var(--navy);
            max-width: 14ch;
            margin-bottom: 1.75rem;
        }

        .hero h1 em {
            font-style: normal;
            color: var(--blue);
        }

        .hero-sub {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--muted);
            max-width: 52ch;
            line-height: 1.65;
            margin-bottom: 2.5rem;
            font-weight: 400;
        }

        .hero-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            background: var(--navy);
            color: var(--white);
            border-radius: 6px;
            font-size: 0.9375rem;
            font-weight: 600;
            transition: background 0.15s, transform 0.1s;
        }

        .btn-primary:hover {
            background: var(--navy-light);
            transform: translateY(-1px);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            background: transparent;
            color: var(--navy);
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 0.9375rem;
            font-weight: 500;
            transition: border-color 0.15s, background 0.15s;
        }

        .btn-secondary:hover {
            border-color: var(--blue);
            background: var(--bg-light);
        }

        .arrow {
            transition: transform 0.15s;
        }

        .btn-primary:hover .arrow,
        .btn-secondary:hover .arrow {
            transform: translateX(3px);
        }

        /* ── POSITIONING STRIP ────────────────────────────────────────────────────── */
        .positioning {
            padding: clamp(3rem, 6vw, 5rem) 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            background: var(--bg-light);
        }

        .positioning p {
            font-size: clamp(1.1rem, 2.2vw, 1.35rem);
            color: var(--text);
            line-height: 1.7;
            max-width: 70ch;
            font-weight: 400;
        }

        .positioning p+p {
            margin-top: 1.25rem;
        }

        .positioning strong {
            font-weight: 600;
            color: var(--navy);
        }

        /* ── DIFFERENTIATORS ──────────────────────────────────────────────────────── */
        .diff-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2.5rem;
            margin-top: 3rem;
        }

        .diff-item {}

        .diff-number {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: 0.875rem;
            display: block;
        }

        .diff-item h3 {
            font-size: 1.0625rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 0.625rem;
            line-height: 1.3;
        }

        .diff-item p {
            font-size: 0.9375rem;
            color: var(--muted);
            line-height: 1.6;
        }

        /* ── SECTION HEADINGS ─────────────────────────────────────────────────────── */
        .section-header {
            margin-bottom: 3rem;
        }

        .section-eyebrow {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--blue);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .section-eyebrow::before {
            content: '';
            width: 1.5rem;
            height: 2px;
            background: var(--blue);
        }

        .section-title {
            font-size: clamp(1.75rem, 3.5vw, 2.5rem);
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.025em;
            color: var(--navy);
        }

        .section-desc {
            margin-top: 1rem;
            font-size: 1.0625rem;
            color: var(--muted);
            max-width: 58ch;
            line-height: 1.65;
        }

        /* ── CASE STUDY CARDS ─────────────────────────────────────────────────────── */
        .cs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5px;
            background: var(--border);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .cs-card {
            background: var(--white);
            padding: 2.25rem 2rem;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            flex-direction: column;
            gap: 0.875rem;
        }

        .cs-card:hover {
            background: var(--bg-light);
        }

        .cs-sector {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--blue);
        }

        .cs-card h3 {
            font-size: 1.0625rem;
            font-weight: 700;
            color: var(--navy);
            line-height: 1.35;
            flex: 1;
        }

        .cs-card p {
            font-size: 0.9375rem;
            color: var(--muted);
            line-height: 1.55;
        }

        .cs-link {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--blue);
            margin-top: 0.5rem;
            transition: gap 0.15s;
        }

        .cs-card:hover .cs-link {
            gap: 0.625rem;
        }

        /* ── HOW WE WORK ──────────────────────────────────────────────────────────── */
        .how-bg {
            background: var(--navy);
            color: var(--white);
        }

        .how-bg .section-eyebrow {
            color: rgba(255, 255, 255, 0.5);
        }

        .how-bg .section-eyebrow::before {
            background: rgba(255, 255, 255, 0.3);
        }

        .how-bg .section-title {
            color: var(--white);
        }

        .how-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            margin-top: 3.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        .how-step {
            padding: 2.5rem 2rem;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }

        .how-step:last-child {
            border-right: none;
        }

        .how-num {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: -0.04em;
            margin-bottom: 1.5rem;
        }

        .how-step h3 {
            font-size: 1.0625rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 0.75rem;
        }

        .how-step p {
            font-size: 0.9375rem;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.65;
        }

        .how-note {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
            text-align: center;
        }

        .how-note strong {
            color: rgba(255, 255, 255, 0.7);
            font-style: normal;
        }

        /* ── HOME CTA ─────────────────────────────────────────────────────────────── */
        .home-cta {
            background: var(--bg-light);
            border-top: 1px solid var(--border);
            text-align: center;
            padding-block: clamp(4rem, 8vw, 6rem);
        }

        .home-cta h2 {
            font-size: clamp(1.75rem, 3.5vw, 2.75rem);
            font-weight: 800;
            letter-spacing: -0.025em;
            color: var(--navy);
            max-width: 20ch;
            margin: 0 auto 1.25rem;
        }

        .home-cta p {
            font-size: 1.0625rem;
            color: var(--muted);
            max-width: 52ch;
            margin: 0 auto 2.5rem;
            line-height: 1.65;
        }

        /* ── PAGE HEADERS ─────────────────────────────────────────────────────────── */
        .page-header {
            padding: clamp(3rem, 6vw, 5rem) 0 clamp(2rem, 4vw, 3rem);
            border-bottom: 1px solid var(--border);
        }

        .page-header .eyebrow {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--blue);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .page-header .eyebrow::before {
            content: '';
            width: 1.5rem;
            height: 2px;
            background: var(--blue);
        }

        .page-header h1 {
            font-size: clamp(2rem, 4.5vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--navy);
            line-height: 1.1;
        }

        .page-header p {
            margin-top: 1rem;
            font-size: 1.0625rem;
            color: var(--muted);
            max-width: 56ch;
            line-height: 1.65;
        }

        /* ── WORK PAGE / CASE STUDY LIST ─────────────────────────────────────────── */
        .cs-list {
            margin-top: 3rem;
        }

        .cs-list-item {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 2rem;
            padding: 2rem 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
            border-radius: 4px;
        }

        .cs-list-item:hover .cs-list-title {
            color: var(--blue);
        }

        .cs-list-item:hover .cs-list-arrow {
            transform: translateX(4px);
            opacity: 1;
        }

        .cs-list-info {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .cs-list-sector {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--blue);
        }

        .cs-list-title {
            font-size: 1.1875rem;
            font-weight: 700;
            color: var(--navy);
            transition: color 0.15s;
            line-height: 1.3;
        }

        .cs-list-summary {
            font-size: 0.9375rem;
            color: var(--muted);
            line-height: 1.55;
            max-width: 58ch;
        }

        .cs-list-arrow {
            font-size: 1.25rem;
            color: var(--blue);
            opacity: 0.3;
            transition: transform 0.15s, opacity 0.15s;
            flex-shrink: 0;
        }

        /* ── CASE STUDY DETAIL ────────────────────────────────────────────────────── */
        .cs-detail-header {
            padding: clamp(3rem, 6vw, 5rem) 0 clamp(2.5rem, 5vw, 4rem);
            background: var(--navy);
            color: var(--white);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 2rem;
            cursor: pointer;
            transition: color 0.15s;
        }

        .back-btn:hover {
            color: var(--white);
        }

        .cs-detail-sector {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 1rem;
        }

        .cs-detail-header h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            letter-spacing: -0.025em;
            color: var(--white);
            line-height: 1.15;
            max-width: 20ch;
            margin-bottom: 1.25rem;
        }

        .cs-detail-header .lead {
            font-size: 1.125rem;
            color: rgba(255, 255, 255, 0.55);
            max-width: 54ch;
            line-height: 1.65;
        }

        .cs-body {
            padding-block: clamp(3rem, 6vw, 5rem);
        }

        .cs-sections {
            max-width: 680px;
        }

        .cs-section {
            margin-bottom: 3.5rem;
        }

        .cs-section-label {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--blue);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .cs-section-label::before {
            content: '';
            width: 1.5rem;
            height: 2px;
            background: var(--blue);
        }

        .cs-section h2 {
            font-size: 1.375rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        .cs-section p {
            font-size: 1rem;
            color: var(--muted);
            line-height: 1.75;
            margin-bottom: 1rem;
        }

        .cs-section p:last-child {
            margin-bottom: 0;
        }

        .cs-nav {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            padding-top: 3rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }

        .cs-nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--navy);
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }

        .cs-nav-btn:hover {
            border-color: var(--blue);
            background: var(--bg-light);
        }

        /* ── SERVICES PAGE ────────────────────────────────────────────────────────── */
        .services-intro {
            font-size: 1.0625rem;
            color: var(--muted);
            max-width: 60ch;
            line-height: 1.7;
            margin-bottom: 4rem;
        }

        .service-block {
            padding: 3rem 0;
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 4rem;
        }

        .service-label {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: 0.75rem;
        }

        .service-block h2 {
            font-size: 1.375rem;
            font-weight: 700;
            color: var(--navy);
            line-height: 1.3;
        }

        .service-block>div:last-child p {
            font-size: 1rem;
            color: var(--muted);
            line-height: 1.75;
            margin-bottom: 1.5rem;
        }

        .service-includes {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--navy);
            margin-bottom: 0.875rem;
        }

        .service-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .service-tag {
            display: inline-block;
            padding: 0.375rem 0.875rem;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.8125rem;
            color: var(--muted);
        }

        /* ── ABOUT PAGE ───────────────────────────────────────────────────────────── */
        .about-intro {
            font-size: clamp(1.05rem, 2vw, 1.2rem);
            color: var(--muted);
            line-height: 1.75;
            max-width: 66ch;
            margin-bottom: 1.5rem;
        }

        .about-intro strong {
            color: var(--text);
            font-weight: 600;
        }

        .bio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin-top: 4rem;
            padding-top: 4rem;
            border-top: 1px solid var(--border);
        }

        .bio-label {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--blue);
            margin-bottom: 0.5rem;
        }

        .bio-role {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 1.5rem;
        }

        .bio h2 {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--navy);
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }

        .bio p {
            font-size: 0.9375rem;
            color: var(--muted);
            line-height: 1.75;

                    "The internal team was overwhelmed. They had no way to keep the site organized, no clear ownership of content, and no confidence that the site was actually serving its mission."
                ],

            {

                    "A national advocacy nonprofit had a strong mission, a recognizable name, and solid web traffic. The problem was what happened after visitors arrived. Donation completion rates were low. Volunteer signups were almost nonexistent online. Partners were reaching out by phone because they couldn't figure out how to connect through the site.",

                approach: [
                    "We mapped the user journey for three core audiences: donors, volunteers, and organizational partners. Each had different entry points, different needs, and different reasons to leave. Once we understood where things were breaking down, the fixes became clearer.",

                    "Donation completion improved. Staff stopped fielding weekly calls from donors who couldn't figure out how to give online. Volunteer signups increased from almost zero to a steady stream within six months.",

        // ── ROUTER ────────────────────────────────────────────────────────────────────

        function navigate(page, data) {
            currentPage = page;
            const app = document.getElementById('app');
            window.scrollTo({ top: 0, behavior: 'instant' });

            // Update nav active state
            ['work', 'services', 'about', 'contact'].forEach(p => {
                const el = document.getElementById('nav-' + p);
                if (el) el.classList.toggle('active', p === page);
            });

            // Render page
            let html = '';
            switch (page) {
                case 'home': html = renderHome(); break;
                case 'work': html = renderWork(); break;
                case 'services': html = renderServices(); break;
                case 'about': html = renderAbout(); break;
                case 'contact': html = renderContact(); break;
                case 'case-study':
                    const cs = CASE_STUDIES.find(c => c.id === data);
                    html = cs ? renderCaseStudy(cs) : renderWork();
                    break;
                default: html = renderHome();
            }

            app.innerHTML = '<div class="page">' + html + '</div>';
        }

        // Scroll listener for nav shadow
        window.addEventListener('scroll', () => {
            document.getElementById('siteNav').classList.toggle('scrolled', window.scrollY > 20);

                body: formData,
                headers: {

                }

                .then(data => {
                    document.getElementById('formSuccess').style.display = 'block';
                    document.getElementById('contactForm').reset();
                })
                .catch(error => {
                    document.getElementById('formSuccess').textContent = 'Error sending message.';
                    document.getElementById('formSuccess').style.color = 'red';
                });
            e.target.style.display = 'none';
        }
